apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: umami-ingress
  namespace: umami  
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: umami.mohamed-uptime.com
    nginx.ingress.kubernetes.io/ssl-redirect: "true"  
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - umami.mohamed-uptime.com
      secretName: umami-tls
  rules:
    - host: umami.mohamed-uptime.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: umami
                port:
                  number: 3000