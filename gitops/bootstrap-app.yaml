apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/mohamed67471/cloud-analytics-platform
    targetRevision: main
    path: bootstrap

  destination:
    server: https://kubernetes.default.svc
    namespace: umami

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true