# Trigger: pipeline test
name: Terraform Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'terraform/**'

permissions:
  id-token: write
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_VERSION: '1.13.1'
  AWS_REGION: 'us-east-1'
  TERRAFORM_DIR: './terraform'

jobs:
  validate:
    name: Validate Terraform
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Format check
        id: fmt
        run: terraform fmt -check -recursive
        working-directory: ${{ env.TERRAFORM_DIR }}
        continue-on-error: true

      - name: Init
        id: init
        run: terraform init -backend=false
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: Validate
        id: validate
        run: terraform validate -no-color
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `Format: \`${{ steps.fmt.outcome }}\`
            Init: \`${{ steps.init.outcome }}\`
            Validate: \`${{ steps.validate.outcome }}\``;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: validate
    
    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov
        id: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.TERRAFORM_DIR }}
          framework: terraform
          output_format: sarif
          output_file_path: reports/results.sarif
          soft_fail: true
          
      - name: Upload results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: reports/results.sarif

  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: [validate, security-scan]
    if: github.event_name == 'pull_request'
    
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Init
        run: terraform init
        working-directory: ${{ env.TERRAFORM_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      - name: Plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        working-directory: ${{ env.TERRAFORM_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
        continue-on-error: true

      - name: Save plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: ${{ env.TERRAFORM_DIR }}/tfplan
          retention-days: 5

      - name: Comment plan
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "Plan complete. Check Actions tab for details."
            })

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: [validate, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
    timeout-minutes: 60
    
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Init
        run: terraform init
        working-directory: ${{ env.TERRAFORM_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      - name: Check cluster exists
        id: check_cluster
        run: |
          if aws eks describe-cluster --name umami-cluster --region us-east-1 2>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        continue-on-error: true

      - name: Apply infrastructure
        if: steps.check_cluster.outputs.exists == 'false'
        run: |
          terraform apply -auto-approve \
            -target=module.vpc \
            -target=module.security_groups \
            -target=module.iam \
            -target=module.eks \
            -target=module.rds
        working-directory: ${{ env.TERRAFORM_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      - name: Wait for cluster
        if: steps.check_cluster.outputs.exists == 'false'
        run: |
          aws eks wait cluster-active --name umami-cluster --region us-east-1
          sleep 30

      - name: Apply all
        id: apply
        run: terraform apply -auto-approve
        working-directory: ${{ env.TERRAFORM_DIR }}
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

      - name: Save outputs
        if: success()
        run: terraform output -json > outputs.json
        working-directory: ${{ env.TERRAFORM_DIR }}

      - name: Upload outputs
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs
          path: ${{ env.TERRAFORM_DIR }}/outputs.json
          retention-days: 30

      - name: Summary
        if: success()
        run: |
          echo "Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "Cluster: umami-cluster" >> $GITHUB_STEP_SUMMARY
          echo "Region: us-east-1" >> $GITHUB_STEP_SUMMARY

      - name: Failed
        if: failure()
        run: |
          echo "Deployment failed"
          exit 1