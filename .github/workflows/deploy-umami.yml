name: Deploy Umami

on:
  push:
    branches:
      - main
    paths:
      - 'umami/**'
      - 'bootstrap/**'
      - '.github/workflows/deploy-umami.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  security-events: write
  packages: write

env:
  AWS_REGION: 'us-east-1'
  CLUSTER_NAME: 'umami-cluster'
  IMAGE_NAME: 'ghcr.io/${{ github.repository_owner }}/umami'

jobs:
  build-and-scan:
    name: Build, Scan & Push
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: ./umami
          push: false
          tags: ${{ steps.meta.outputs.tags }}
          load: true

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.tags }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Trivy summary
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.tags }}
          format: 'table'
          severity: 'CRITICAL,HIGH'

      - name: Push image
        uses: docker/build-push-action@v5
        with:
          context: ./umami
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Apply bootstrap resources
        run: |
          kubectl apply -f bootstrap/namespace.yaml
          kubectl apply -f bootstrap/rds-ca-configmap.yaml
          kubectl apply -f bootstrap/cert-manager.yaml
          kubectl apply -f bootstrap/cluster-issuer.yaml

      - name: Update image tag
        run: |
          IMAGE_TAG=${{ needs.build-and-scan.outputs.image_tag }}
          sed -i "s|image: ghcr.io/mohamed67471/umami:.*|image: ghcr.io/mohamed67471/umami:${IMAGE_TAG}|g" gitops/apps/umami/deployment.yaml

      - name: Commit updated image tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add gitops/apps/umami/deployment.yaml
          git commit -m "chore: update umami image to ${{ needs.build-and-scan.outputs.image_tag }}"
          git push

      - name: Apply ArgoCD application
        run: |
          kubectl apply -f gitops/root-app.yaml

      - name: Wait for deployment
        run: |
          kubectl wait --for=condition=available --timeout=300s deployment/umami -n umami || true

      - name: Check status
        run: |
          kubectl get pods -n umami
          kubectl get ingress -n umami
          kubectl get certificate -n umami

      - name: Deployment summary
        if: success()
        run: |
          echo "Deployment complete" >> $GITHUB_STEP_SUMMARY
          echo "Image: ${{ env.IMAGE_NAME }}:${{ needs.build-and-scan.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY